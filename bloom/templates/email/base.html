<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{ subject }}</title>
  </head>
  <body style="margin: 0; padding: 24px; background-color: #f5f5f4; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif; color: #1c1917;">
    <table role="presentation" cellpadding="0" cellspacing="0" style="width: 100%; max-width: 520px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; border: 1px solid #e7e5e4;">
      <tr>
        <td style="padding: 32px;">
          <p style="margin: 0 0 24px; font-size: 18px; font-weight: 600; letter-spacing: -0.01em;">Bloom</p>
          {% block content %}{% endblock %}
        </td>
      </tr>
    </table>
    <p style="max-width: 520px; margin: 16px auto 0; font-size: 12px; color: #78716c; text-align: center;">
      You received this email because someone used this address on a Bloom instance.
    </p>
  </body>
</html>
