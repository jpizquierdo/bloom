services:
  db:
    image: postgres:16
    container_name: bloom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bloom
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
    ports:
      - "5432:5432"
    volumes:
      - bloom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloom -d bloom"]
      interval: 5s
      timeout: 5s
      retries: 5
  mailpit:
    image: axllent/mailpit:v1.21
    container_name: bloom-mailpit
    restart: unless-stopped
    ports:
      # Web UI at http://localhost:8025 — every email the app sends lands here.
      - "8025:8025"
      - "1025:1025"

  bloom:
    image: jpizquierdo/bloom:0.4.1
    container_name: bloom-core
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: bloom
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
      POSTGRES_SERVER: db
      # Catch outgoing mail locally instead of delivering it. Point these at a real
      # SMTP server (in .env) to send for real.
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_TLS: "false"
      EMAILS_FROM_EMAIL: bloom@example.com
      # The image serves UI + API on the same port, so email links must point here,
      # not at the Vite dev server. In production set this to your public URL.
      FRONTEND_HOST: http://localhost:8000
    ports:
      # The image serves the web UI and the API together: http://localhost:8000
      - "8000:8000"
    healthcheck:
      # The image is python-slim: no curl/wget available, so probe with urllib.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  bloom_pgdata:
