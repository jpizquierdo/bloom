services:
  db:
    image: postgres:16
    container_name: bloom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bloom
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
    ports:
      - "5432:5432"
    volumes:
      - bloom_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloom -d bloom"]
      interval: 5s
      timeout: 5s
      retries: 5
  bloom:
    image: jpizquierdo/bloom:0.2.0
    container_name: bloom-core
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      POSTGRES_DB: bloom
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
      POSTGRES_SERVER: db
    ports:
      # The image serves the web UI and the API together: http://localhost:8000
      - "8000:8000"
    healthcheck:
      # The image is python-slim: no curl/wget available, so probe with urllib.
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  bloom_pgdata:
