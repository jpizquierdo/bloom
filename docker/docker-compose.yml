services:
  db:
    image: postgres:16
    container_name: bloom-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: bloom
      POSTGRES_USER: bloom
      POSTGRES_PASSWORD: bloom
    ports:
      - "5432:5432"
    volumes:
      - bloom_pgdata:/var/lib/postgresql/data
      # NOTE: the schema is owned by Alembic migrations, not an init script.
      # Run `uv run alembic upgrade head` after the container is up.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bloom -d bloom"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  bloom_pgdata:
