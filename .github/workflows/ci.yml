name: CI

on:
  push:
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: bloom
          POSTGRES_USER: bloom
          POSTGRES_PASSWORD: bloom
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Tests
        run: uv run pytest

      # openapi.json is generated from the FastAPI app and committed; fail if it drifts.
      - name: OpenAPI schema is up to date
        run: |
          uv run python scripts/dump_openapi.py
          git diff --exit-code openapi.json

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # src/client is generated from openapi.json and committed; fail if it drifts.
      - name: Generated client is up to date
        run: |
          npm run generate-client
          git diff --exit-code src/client

      - name: Lint (oxlint)
        run: npm run lint

      # The release image bundles this build, so a type error must fail CI, not the release.
      - name: Build
        run: npm run build
