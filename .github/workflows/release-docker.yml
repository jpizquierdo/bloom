name: Build and Push Docker Image on Release

on:
  release:
    types: [created]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Compute image tags
        id: tags
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          # Always tag the exact version. A prerelease (e.g. v0.3.0-rc1) stops
          # there — it must not move the floating `latest` or minor tags that
          # point at the newest stable release.
          TAGS="jpizquierdo/bloom:${VERSION}"
          if [ "${{ github.event.release.prerelease }}" != "true" ]; then
            MINOR_VERSION=$(echo "$VERSION" | cut -d '.' -f1,2)
            TAGS="${TAGS}"$'\n'"jpizquierdo/bloom:${MINOR_VERSION}"
            TAGS="${TAGS}"$'\n'"jpizquierdo/bloom:latest"
          fi
          {
            echo "tags<<EOF"
            echo "$TAGS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.tags.outputs.tags }}
